<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC Billing Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744;
  --navy-light: #243259;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --cream: #faf8f3;
  --white: #ffffff;
  --red: #c0392b;
  --red-light: #fdecea;
  --amber: #d68910;
  --amber-light: #fef9ec;
  --green: #1e8449;
  --green-light: #eafaf1;
  --blue: #1a5276;
  --blue-light: #eaf4fb;
  --gray: #6c7a89;
  --gray-light: #f4f4f6;
  --border: #e2e0d8;
  --shadow: 0 2px 12px rgba(26,39,68,0.10);
  --shadow-lg: 0 8px 32px rgba(26,39,68,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--navy);
  min-height: 100vh;
}

/* ── Layout ── */
.app { display:flex; min-height:100vh; }

.sidebar {
  width: 240px;
  background: var(--navy);
  color: var(--white);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar-logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--gold-light);
  line-height: 1.2;
}
.sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top:3px; letter-spacing:.5px; text-transform:uppercase; }

.nav-section { padding: 16px 0 8px; }
.nav-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 0 20px 8px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  transition: all .15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
.nav-item.active { background: rgba(201,168,76,0.15); color: var(--gold-light); border-left-color: var(--gold); }
.nav-item .badge {
  margin-left: auto;
  background: var(--red);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.nav-icon { font-size:15px; width:18px; text-align:center; }

.main { margin-left: 240px; flex:1; }

.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar h2 { font-family:'DM Serif Display',serif; font-size:22px; font-weight:400; }
.topbar-actions { display:flex; gap:10px; align-items:center; }

.content { padding: 28px 32px; }

/* ── Cards ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family:'DM Serif Display',serif;
  font-size:16px; font-weight:400;
  margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}

/* ── Stats Grid ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
}
.stat-card.danger::before { background:var(--red); }
.stat-card.warning::before { background:var(--amber); }
.stat-card.success::before { background:var(--green); }
.stat-card.info::before { background:var(--blue); }
.stat-number { font-family:'DM Serif Display',serif; font-size:36px; font-weight:400; line-height:1; }
.stat-card.danger .stat-number { color:var(--red); }
.stat-card.warning .stat-number { color:var(--amber); }
.stat-card.success .stat-number { color:var(--green); }
.stat-card.info .stat-number { color:var(--blue); }
.stat-label { font-size:12px; color:var(--gray); margin-top:6px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; }

/* ── Flags ── */
.flag-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all .15s;
}
.flag-item:hover { box-shadow: var(--shadow); }
.flag-item.MISSING_FROM_STATEMENT, .flag-item.NO_AUTHORIZATION { border-left: 4px solid var(--red); background: var(--red-light); }
.flag-item.NOT_FOUND_IN_DHS { border-left: 4px solid var(--amber); background: var(--amber-light); }
.flag-item.NEW_CHILD_NO_STATUS { border-left: 4px solid var(--blue); background: var(--blue-light); }
.flag-item.AFTER_CLOSING_PICKUP { border-left: 4px solid var(--amber); background: var(--amber-light); }
.flag-icon { font-size:20px; margin-top:1px; flex-shrink:0; }
.flag-body { flex:1; }
.flag-name { font-weight:600; font-size:14px; }
.flag-detail { font-size:13px; color:var(--gray); margin-top:2px; }
.flag-meta { font-size:11px; color:var(--gray); margin-top:4px; }
.flag-actions { display:flex; gap:8px; margin-top:8px; }

/* ── Tables ── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
th { background:var(--navy); color:var(--gold-light); font-weight:500; padding:10px 14px; text-align:left; font-size:12px; letter-spacing:.3px; }
td { padding:9px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:hover td { background:#f8f7f3; }
.badge-pill {
  display:inline-block;
  padding:2px 10px;
  border-radius:12px;
  font-size:11px;
  font-weight:600;
  letter-spacing:.3px;
}
.badge-noauth { background:var(--red-light); color:var(--red); }
.badge-paid { background:var(--green-light); color:var(--green); }
.badge-missing { background:var(--amber-light); color:var(--amber); }
.badge-pending { background:var(--gray-light); color:var(--gray); }
.badge-cdc { background:#e8f4fd; color:#1a5276; }
.badge-gsrp { background:#f0e6ff; color:#6c3483; }
.badge-private { background:var(--gray-light); color:var(--gray); }
.badge-both { background:#fef9ec; color:#d68910; }
.badge-unknown { background:#fce4ec; color:#c62828; }

/* ── Buttons ── */
.btn {
  padding: 8px 16px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all .15s;
  font-family: inherit;
}
.btn-primary { background:var(--navy); color:var(--white); }
.btn-primary:hover { background:var(--navy-light); }
.btn-gold { background:var(--gold); color:var(--navy); }
.btn-gold:hover { background:var(--gold-light); }
.btn-ghost { background:transparent; color:var(--navy); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--gray-light); }
.btn-danger { background:var(--red); color:var(--white); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-green { background:var(--green); color:white; }
.btn-green:hover { opacity:.85; }

/* ── Forms ── */
.form-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:160px; }
label { font-size:12px; font-weight:600; color:var(--navy); text-transform:uppercase; letter-spacing:.4px; }
input, select, textarea {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 13.5px;
  font-family: inherit;
  background: var(--white);
  color: var(--navy);
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus {
  outline:none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
}
.checkbox-row { display:flex; align-items:center; gap:8px; font-size:13.5px; }
.checkbox-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--navy); }

/* ── Tabs ── */
.tabs { display:flex; gap:2px; border-bottom:2px solid var(--border); margin-bottom:20px; }
.tab {
  padding:10px 18px;
  cursor:pointer;
  font-size:13.5px;
  font-weight:500;
  color:var(--gray);
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  transition:all .15s;
}
.tab:hover { color:var(--navy); }
.tab.active { color:var(--navy); border-bottom-color:var(--gold); font-weight:600; }

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--gray-light);
}
.upload-zone:hover, .upload-zone.drag { border-color:var(--gold); background:var(--amber-light); }
.upload-zone p { font-size:14px; color:var(--gray); margin-top:8px; }

/* ── Center selector ── */
.center-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.center-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 2px solid var(--border);
  background: var(--white);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  font-family: inherit;
  color: var(--gray);
}
.center-btn.active { border-color:var(--navy); background:var(--navy); color:var(--white); }
.center-btn:hover:not(.active) { border-color:var(--navy); color:var(--navy); }

/* ── Loading / Empty ── */
.loading { text-align:center; padding:40px; color:var(--gray); font-size:14px; }
.empty { text-align:center; padding:40px; color:var(--gray); }
.empty-icon { font-size:48px; margin-bottom:12px; }

/* ── Modal ── */
.modal-overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,0.5);
  z-index:200;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--white);
  border-radius:12px;
  padding:28px;
  width:90%;
  max-width:500px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow: var(--shadow-lg);
}
.modal-title { font-family:'DM Serif Display',serif; font-size:20px; margin-bottom:20px; }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

/* ── Billing output ── */
.billing-block {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
}
.billing-block-header {
  background: var(--navy);
  color: var(--white);
  padding: 10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  font-size:14px;
  font-weight:500;
}
.billing-block-body { padding:12px 16px; }
.time-entry {
  display:flex; gap:12px; align-items:center;
  padding:6px 0;
  border-bottom:1px solid var(--gray-light);
  font-size:13px;
}
.time-entry:last-child { border-bottom:none; }
.time-tag {
  font-size:11px;
  padding:2px 8px;
  border-radius:4px;
  font-weight:600;
}
.time-tag.cdc { background:#e8f4fd; color:#1a5276; }
.time-tag.gsrp { background:#f0e6ff; color:#6c3483; }
.time-tag.private { background:var(--gray-light); color:var(--gray); }
.time-tag.fee { background:var(--red-light); color:var(--red); }

/* ── Toasts ── */
#toast-container { position:fixed; bottom:24px; right:24px; z-index:1000; display:flex; flex-direction:column; gap:8px; }
.toast {
  background:var(--navy);
  color:var(--white);
  padding:12px 18px;
  border-radius:8px;
  font-size:13.5px;
  box-shadow:var(--shadow-lg);
  animation:slideIn .2s ease;
}
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }
.toast.warning { background:var(--amber); }
@keyframes slideIn { from{transform:translateX(60px);opacity:0} to{transform:none;opacity:1} }

/* ── Period status ── */
.period-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--gray-light); font-size:13.5px; }
.period-num { font-family:'DM Serif Display',serif; font-size:22px; color:var(--navy); min-width:50px; }
.period-dates { color:var(--gray); font-size:12px; }
.period-status { margin-left:auto; display:flex; gap:8px; }

input[type="file"] { display:none; }
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>TCC Billing Hub</h1>
    <p>The Children's Center</p>
  </div>
  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="nav-icon">📊</span> Dashboard
      <span class="badge" id="flag-badge" style="display:none">0</span>
    </div>
    <div class="nav-item" onclick="showPage('instructions')">
      <span class="nav-icon">📖</span> Instructions
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">CDC Billing</div>
    <div class="nav-item" onclick="showPage('cdc-filing-wizard')">
      <span class="nav-icon">🪄</span> CDC Filing Wizard
    </div>
    <div class="nav-item" onclick="showPage('cdc-reconciliation')">
      <span class="nav-icon">📋</span> Reconciliation
    </div>
    <div class="nav-item" onclick="showPage('billing-periods')">
      <span class="nav-icon">📅</span> Billing Periods
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Attendance</div>
    <div class="nav-item" onclick="showPage('upload-attendance')">
      <span class="nav-icon">⬆️</span> Upload Timesheets
    </div>
    <div class="nav-item" onclick="showPage('billing-engine')">
      <span class="nav-icon">⚙️</span> Billing Engine
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Management</div>
    <div class="nav-item" onclick="showPage('import-roster')">
      <span class="nav-icon">📥</span> Import Roster
    </div>
    <div class="nav-item" onclick="showPage('children')">
      <span class="nav-icon">👶</span> Child Roster
    </div>
    <div class="nav-item" onclick="showPage('flags')">
      <span class="nav-icon">🚩</span> All Flags
    </div>
    <div class="nav-item" onclick="showPage('no-school-days')">
      <span class="nav-icon">🏫</span> No-School Days
    </div>
    <div class="nav-item" onclick="showPage('tuition-rates')">
      <span class="nav-icon">💰</span> Tuition Rates
    </div>
  </div>
</nav>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>

</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast-container"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// URL token wins. If it's present, store it. Otherwise use any stored token.
// If a stored token is invalid the server will tell us and we'll clear it.
const URL_TOKEN = new URLSearchParams(location.search).get('token');
if (URL_TOKEN) localStorage.setItem('tcc_token', URL_TOKEN);
let TOKEN = URL_TOKEN || localStorage.getItem('tcc_token') || '';
let AUTH_MODE = { allowDirectAccess: false, user: null };

function clearStoredToken() {
  localStorage.removeItem('tcc_token');
  TOKEN = '';
}

const CENTERS = ['Niles', 'Peace', 'Montessori'];
let currentCenter = 'Niles';

const FLAG_ICONS = {
  NO_AUTHORIZATION: '🔴',
  MISSING_FROM_STATEMENT: '🔴',
  NOT_FOUND_IN_DHS: '🟡',
  NEW_CHILD_NO_STATUS: '🔵',
  AFTER_CLOSING_PICKUP: '🟡',
};
const FLAG_LABELS = {
  NO_AUTHORIZATION: 'No Authorization',
  MISSING_FROM_STATEMENT: 'Missing from Statement',
  NOT_FOUND_IN_DHS: 'Not Found in DHS',
  NEW_CHILD_NO_STATUS: 'Unknown Subsidy Status',
  AFTER_CLOSING_PICKUP: 'Late Pickup — After Closing',
};

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type':'application/json' }
  };
  if (TOKEN) opts.headers['Authorization'] = `Bearer ${TOKEN}`;
  if (body) opts.body = JSON.stringify(body);
  let res = await fetch('/api' + path, opts);
  if (res.status === 401 && TOKEN) {
    // Stale token — clear it and retry once (server may allow direct access)
    clearStoredToken();
    delete opts.headers['Authorization'];
    res = await fetch('/api' + path, opts);
  }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function uploadFile(path, formData) {
  const headers = {};
  if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
  let res = await fetch('/api' + path, { method: 'POST', headers, body: formData });
  if (res.status === 401 && TOKEN) {
    clearStoredToken();
    delete headers['Authorization'];
    res = await fetch('/api' + path, { method: 'POST', headers, body: formData });
  }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── Center Selector HTML ──────────────────────────────────────────────────────
function centerSelector(onChange) {
  return `<div class="center-selector">
    ${CENTERS.map(c => `<button class="center-btn ${c===currentCenter?'active':''}"
      onclick="currentCenter='${c}';${onChange}">${c}</button>`).join('')}
  </div>`;
}

// ── Page Router ───────────────────────────────────────────────────────────────
const pages = {};
function showPage(name) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.textContent.trim().toLowerCase().includes(name.replace(/-/g,' ').split(' ')[0])) el.classList.add('active');
  });
  pages[name]?.();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
pages['dashboard'] = async () => {
  document.getElementById('page-title').textContent = 'Dashboard';
  document.getElementById('topbar-actions').innerHTML = '';
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading dashboard…</div>';
  try {
    const [dash, flags] = await Promise.all([
      api('GET', '/dashboard'),
      api('GET', '/flags?resolved=false')
    ]);

    // Update badge
    const total = flags.length;
    const badge = document.getElementById('flag-badge');
    badge.textContent = total;
    badge.style.display = total > 0 ? 'inline-block' : 'none';

    const noAuthCount = flags.filter(f => f.flag_type==='NO_AUTHORIZATION').length;
    const missingCount = flags.filter(f => f.flag_type==='MISSING_FROM_STATEMENT').length;
    const notFoundCount = flags.filter(f => f.flag_type==='NOT_FOUND_IN_DHS').length;
    const newChildCount = flags.filter(f => f.flag_type==='NEW_CHILD_NO_STATUS').length;
    const latePickup = flags.filter(f => f.flag_type==='AFTER_CLOSING_PICKUP').length;

    content.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card danger">
          <div class="stat-number">${noAuthCount + missingCount}</div>
          <div class="stat-label">CDC Billing Issues</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-number">${notFoundCount}</div>
          <div class="stat-label">Not Found in DHS</div>
        </div>
        <div class="stat-card info">
          <div class="stat-number">${newChildCount}</div>
          <div class="stat-label">Unknown Subsidy Status</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-number">${latePickup}</div>
          <div class="stat-label">Late Pickup Alerts</div>
        </div>
        <div class="stat-card ${total > 0 ? 'danger' : 'success'}">
          <div class="stat-number">${total}</div>
          <div class="stat-label">Total Open Flags</div>
        </div>
      </div>

      ${dash.overduePeriods?.length ? `
      <div class="card">
        <div class="card-title">⚠️ Overdue Billing Periods</div>
        ${dash.overduePeriods.map(p => `
          <div class="period-row">
            <div class="period-num">${p.period_number}</div>
            <div>
              <div>${fmtDate(p.start_date)} – ${fmtDate(p.end_date)}</div>

    ? `<div class="empty"><div class="empty-icon">${tab==='open'?'✅':'📭'}</div><p>No ${tab} flags.</p></div>`

      <div class="flag-item ${f.flag_type}" style="${f.resolved?'opacity:.6':''}">
        <div class="flag-icon">${FLAG_ICONS[f.flag_type]||'🔵'}</div>
        <div class="flag-body">

pages['cdc-reconciliation'] = async () => {
  document.getElementById('page-title').textContent = 'CDC Reconciliation';
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-gold" onclick="showCDCUpload()">Upload CDC Statement</button>`;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading…</div>';

  const renderCDC = async () => {
    const [periods, cdcData] = await Promise.all([
      api('GET', '/billing-periods'),
      api('GET', `/cdc-periods?center=${currentCenter}`)
    ]);
    const grouped = {};
    for (const r of cdcData) {
      if (!grouped[r.period_number]) grouped[r.period_number] = [];
      grouped[r.period_number].push(r);
    }

    content.innerHTML = `
      ${centerSelector('renderCDC()')}
      ${Object.keys(grouped).length === 0 ? `
        <div class="card"><div class="empty"><div class="empty-icon">📭</div>
        <p>No CDC data for ${currentCenter} yet. Upload a CDC statement to get started.</p>
        <button class="btn btn-gold" style="margin-top:12px" onclick="showCDCUpload()">Upload Statement</button>
        </div></div>
      ` : Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0])).map(([period, rows]) => {
        const total = rows.reduce((s,r) => s+(parseFloat(r.amount_paid)||0), 0);
        const noAuth = rows.filter(r=>r.status==='no_auth').length;
        const missing = rows.filter(r=>r.status==='missing_from_statement').length;
        return `
        <div class="card" style="padding:0;margin-bottom:16px">
          <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">
            <div style="font-family:'DM Serif Display',serif;font-size:22px">Period ${period}</div>
            <div style="font-size:13px;color:var(--gray)">${rows.length} children · $${total.toFixed(2)} received</div>
            ${noAuth > 0 ? `<span class="badge-pill badge-noauth">${noAuth} No Auth</span>` : ''}
            ${missing > 0 ? `<span class="badge-pill badge-missing">${missing} Missing</span>` : ''}
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Child Name</th>
                <th>Billed</th>
                <th>Amount Paid</th>
                <th>Applied</th>
                <th>Status</th>
                <th>Notes</th>
                <th></th>
              </tr></thead>
              <tbody>
              ${rows.map(r => `
                <tr>
                  <td><strong>${r.child_name}</strong></td>
                  <td>${r.billed ? '✅' : '—'}</td>
                  <td>${r.amount_paid ? '$'+parseFloat(r.amount_paid).toFixed(2) : '—'}</td>
                  <td>${r.applied_to_account ? '✅' : '<span style="color:var(--amber)">No</span>'}</td>
                  <td>${statusBadge(r.status)}</td>
                  <td style="font-size:12px;color:var(--gray)">${r.notes||''}</td>
                  <td><button class="btn btn-sm btn-ghost" onclick='editCDCRow(${JSON.stringify(r)})'>Edit</button></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
      }).join('')}`;
  };
  window.renderCDC = renderCDC;
  await renderCDC();
};

function statusBadge(s) {
  const map = {
    no_auth: '<span class="badge-pill badge-noauth">No Auth</span>',
    paid: '<span class="badge-pill badge-paid">Paid</span>',
    missing_from_statement: '<span class="badge-pill badge-missing">Missing</span>',
    not_found: '<span class="badge-pill badge-noauth">Not Found</span>',
    pending: '<span class="badge-pill badge-pending">Pending</span>',
    unknown: '<span class="badge-pill badge-pending">Unknown</span>',

  openModal(`
    <div class="modal-title">Upload CDC Statement</div>
    <div class="form-row">
      <div class="form-group"><label>Center</label>
        <select id="ucenter">${CENTERS.map(c=>`<option ${c===currentCenter?'selected':''}>${c}</option>`).join('')}</select>

      <p style="font-size:12px">Columns: Child Name, Amount Paid, Status/Notes</p>

async function handleCDCUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const center = document.getElementById('ucenter').value;
  const period = document.getElementById('uperiod').value.trim();
  if (!period) return toast('Enter a period number','error');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('center', center);
  fd.append('period_number', period);
  try {
    const result = await uploadFile('/upload/cdc-statement', fd);
    toast(`Uploaded ${result.inserted} records. ${result.flags.length} flags raised.`,
      result.flags.length > 0 ? 'warning' : 'success');
    closeModal();
    pages['cdc-reconciliation']();
  } catch(e) { toast('Upload error: '+e.message,'error'); }
}

async function runBillingEngine() {
  const start = document.getElementById('be-start').value;
  const end = document.getElementById('be-end').value;
  if (!start || !end) return toast('Select date range','error');
  document.getElementById('billing-output').innerHTML = '<div class="loading">Calculating…</div>';
  try {
    const results = await api('GET', `/billing/calculate?center=${currentCenter}&start_date=${start}&end_date=${end}`);
    if (results.length === 0) {
      document.getElementById('billing-output').innerHTML =
        '<div class="card"><div class="empty"><div class="empty-icon">📭</div><p>No attendance records found for this period.</p></div></div>';
      return;
    }
    let html = `<div style="margin-bottom:16px;font-size:13.5px;color:var(--gray)">${results.length} children found · ${start} to ${end}</div>`;
    for (const child of results) {
      const cdcCount = child.cdcBillableBlocks.length;
      const gsrpCount = child.gsrpBlocks.length;
      const privateCount = child.privateBillable.length;
      const feeTotal = child.latePickupFees.reduce((s,f)=>s+f.fee,0);
      const noSchoolTotal = child.noSchoolDayCharges.reduce((s,c)=>s+c.hourlyCharge,0);
      html += `
        <div class="billing-block">
          <div class="billing-block-header">
            <div>
              <strong>${child.childName}</strong>
              <span style="margin-left:10px;font-size:12px;opacity:.7">${subsidyType(child)}</span>
            </div>
            <div style="font-size:12px;display:flex;gap:10px">
              ${cdcCount > 0 ? `<span style="color:#7fc7f0">${cdcCount} CDC blocks</span>` : ''}
              ${gsrpCount > 0 ? `<span style="color:#c39bd3">${gsrpCount} GSRP blocks</span>` : ''}
              ${privateCount > 0 ? `<span style="color:#aaa">${privateCount} private</span>` : ''}
              ${feeTotal > 0 ? `<span style="color:#f1948a">$${feeTotal.toFixed(2)} late fees</span>` : ''}
            </div>
          </div>
          <div class="billing-block-body">
            ${[...child.cdcBillableBlocks.map(b=>({...b,tag:'cdc'})),
               ...child.gsrpBlocks.map(b=>({...b,tag:'gsrp'})),
               ...child.privateBillable.map(b=>({...b,tag:'private'}))]
              .sort((a,b)=>a.date.localeCompare(b.date)||a.in.localeCompare(b.in))
              .map(b=>`
                <div class="time-entry">
                  <span class="time-tag ${b.tag}">${b.billTo}</span>
                  <span style="color:var(--gray);font-size:12px">${b.date}</span>
                  <span>${fmtTime(b.in)} → ${fmtTime(b.out)}</span>
                  <span style="color:var(--gray);font-size:12px">(${minuteDiff(b.in,b.out)} hrs)</span>
                  ${b.type ? `<span style="font-size:11px;color:var(--gray)">${b.type.replace(/_/g,' ')}</span>` : ''}
                </div>`).join('')}
            ${child.latePickupFees.map(f=>`
                <div class="time-entry">
                  <span class="time-tag fee">LATE FEE</span>
                  <span style="color:var(--gray);font-size:12px">${f.date}</span>
                  <span>Pickup at ${fmtTime(f.checkoutTime)} — ${f.minsLate} min late</span>
                  <span style="color:var(--red);font-weight:600">$${f.fee.toFixed(2)}</span>
                </div>`).join('')}
            ${child.noSchoolDayCharges.map(c=>`
                <div class="time-entry">
                  <span class="time-tag fee">NO-SCHOOL FEE</span>
                  <span style="color:var(--gray);font-size:12px">${c.date}</span>
                  <span>${c.hours} hrs × $8/hr</span>
                  <span style="color:var(--red);font-weight:600">$${c.hourlyCharge.toFixed(2)}</span>
                </div>`).join('')}
          </div>
        </div>`;
    }
    document.getElementById('billing-output').innerHTML = html;
  } catch(e) {
    document.getElementById('billing-output').innerHTML =
      `<div class="card"><div style="color:var(--red)">Error: ${e.message}</div></div>`;
  }
};

function subsidyType(child) {
  if (child.isGsrp && child.isCdc) return 'GSRP + CDC';
  if (child.isGsrp) return 'GSRP';
  if (child.isCdc) return 'CDC';
  return child.subsidyType || 'Private';
}

function fmtTime(t) {
  if (!t) return '—';
  const [h,m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hr = h > 12 ? h-12 : h === 0 ? 12 : h;
  return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
}

function minuteDiff(a, b) {
  if (!a || !b) return '?';
  const [ah,am] = a.split(':').map(Number);
  const [bh,bm] = b.split(':').map(Number);
  const diff = (bh*60+bm) - (ah*60+am);
  return (diff/60).toFixed(1);
}

function fmtDateShort(d) {

async function renderWizard() {
  const content = document.getElementById('content');

  // Refresh status if we have a period selected
  if (WIZARD_STATE.periodNumber) {
    try {
      const s = await api('GET', `/cdc-filing/status?period_number=${WIZARD_STATE.periodNumber}`);
      WIZARD_STATE.centerStatus = s.status;
    } catch (e) { /* non-fatal */ }
  }

  const step = WIZARD_STATE.step;
  const stepLabels = ['Pick Period', 'Upload Niles', 'Upload Peace', 'Upload Montessori', 'Generate & Download'];

  const stepsHtml = `
    <div style="display:flex;gap:6px;margin-bottom:24px;background:var(--white);padding:14px;border-radius:10px;box-shadow:var(--shadow)">
      ${stepLabels.map((label, i) => {
        const n = i + 1;
        const isActive = n === step;
        const isDone = n < step;
        const color = isDone ? 'var(--green)' : isActive ? 'var(--gold)' : 'var(--border)';
        const textColor = isDone ? 'var(--green)' : isActive ? 'var(--navy)' : 'var(--gray)';
        return `
          <div style="flex:1;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;
                      background:${isActive ? 'var(--cream)' : 'transparent'};cursor:pointer"
               onclick="WIZARD_STATE.step=${n};renderWizard()">
            <div style="width:28px;height:28px;border-radius:50%;background:${color};color:${isDone||isActive?'var(--white)':'var(--gray)'};
                        display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0">
              ${isDone ? '✓' : n}
            </div>
            <div style="font-size:12.5px;font-weight:${isActive?'600':'400'};color:${textColor}">${label}</div>
          </div>`;
      }).join('')}
    </div>`;

  content.innerHTML = stepsHtml + `<div id="wizard-body"></div>`;
  const body = document.getElementById('wizard-body');

  if (step === 1) renderWizardStep1(body);
  else if (step === 2) renderWizardStep_UploadCenter(body, 'Niles');
  else if (step === 3) renderWizardStep_UploadCenter(body, 'Peace');
  else if (step === 4) renderWizardStep_UploadCenter(body, 'Montessori');
  else if (step === 5) renderWizardStep5(body);
}

async function renderWizardStep1(body) {
  body.innerHTML = '<div class="loading">Loading billing periods…</div>';
  const periods = await api('GET', '/billing-periods');

  // Find the most likely "current" period (the one whose reporting deadline is nearest today)
  const today = new Date().toISOString().split('T')[0];
  const current = periods.find(p => {
    const end = new Date(p.end_date).toISOString().split('T')[0];
    const deadline = new Date(p.reporting_deadline).toISOString().split('T')[0];
    return end <= today && deadline >= today;
  }) || periods.find(p => new Date(p.end_date).toISOString().split('T')[0] <= today);

  body.innerHTML = `
    <div class="card">
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy);margin-bottom:8px">
        Step 1 — Pick the CDC Period
      </div>
      <p style="color:var(--gray);font-size:14px;line-height:1.7;margin-bottom:20px">
        Select the billing period you're filing for. The period's date range will be used for all three attendance uploads.

        <label>CDC Billing Period</label>
        <select id="wiz-period" style="font-size:14px">
          <option value="">— Select a period —</option>
          ${periods.map(p => {
            const sel = current && p.period_number === current.period_number ? 'selected' : '';
            return `<option value="${p.period_number}" ${sel}
              data-start="${p.start_date}" data-end="${p.end_date}"
              data-deadline="${p.reporting_deadline}">
              Period ${p.period_number}: ${fmtDateShort(p.start_date)} – ${fmtDateShort(p.end_date)}
              (file by ${fmtDateShort(p.reporting_deadline)})
            </option>`;
          }).join('')}
        </select>
      </div>

      <div id="wiz-period-info" style="margin-top:16px"></div>

      <div style="margin-top:24px;display:flex;gap:10px">
        <button class="btn btn-gold" onclick="wizardConfirmPeriod()">Continue to Niles Upload →</button>
      </div>
    </div>`;

  document.getElementById('wiz-period').addEventListener('change', updatePeriodInfo);
  updatePeriodInfo();
}

function updatePeriodInfo() {

async function wizardClearCenter(center) {
  if (!confirm(`Delete all ${center} attendance for period ${WIZARD_STATE.periodNumber}?`)) return;
  try {
    const r = await fetch(`/api/cdc-filing/attendance?period_number=${WIZARD_STATE.periodNumber}&center=${encodeURIComponent(center)}`, {
      method: 'DELETE',
      headers: TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {},
    });
    const j = await r.json();
    toast(`Cleared ${j.deleted} records`, 'success');
    await renderWizard();
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

async function wizardUploadAttendance(input, center) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  fd.append('center', center);
  fd.append('period_number', WIZARD_STATE.periodNumber);

  document.getElementById('wiz-upload-result').innerHTML = '<div class="loading">Uploading…</div>';
  try {
    const result = await uploadFile('/cdc-filing/upload-attendance', fd);
    document.getElementById('wiz-upload-result').innerHTML = `
      <div style="background:var(--green-light);border:1px solid var(--green);border-radius:8px;padding:16px">
        <strong style="color:var(--green);font-size:15px">✅ ${center} attendance uploaded</strong>
        <div style="margin-top:8px;font-size:13.5px">
          ${result.processed} attendance records processed ·
          ${result.autoCreated} new children auto-created ·
          ${result.flags.length} flag${result.flags.length!==1?'s':''} raised
        </div>
        ${result.flags.length > 0 ? `
          <div style="margin-top:10px;font-size:13px">
            ${result.flags.slice(0,10).map(f => `<div>🔵 ${f.childName} — ${FLAG_LABELS[f.type]||f.type}</div>`).join('')}
            ${result.flags.length > 10 ? `<div style="margin-top:6px;color:var(--gray)">…and ${result.flags.length-10} more. Review in <strong>All Flags</strong> before submitting.</div>` : ''}
          </div>` : ''}
        <div style="margin-top:12px">
          <button class="btn btn-sm btn-primary" onclick="WIZARD_STATE.step=${WIZARD_STATE.step+1};renderWizard()">Continue →</button>
        </div>
      </div>`;
    // Refresh center status
    const s = await api('GET', `/cdc-filing/status?period_number=${WIZARD_STATE.periodNumber}`);
    WIZARD_STATE.centerStatus = s.status;
  } catch (e) {
    document.getElementById('wiz-upload-result').innerHTML =
      `<div style="background:var(--red-light);border:1px solid var(--red);border-radius:8px;padding:16px;color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function renderWizardStep5(body) {
  body.innerHTML = '<div class="loading">Running rules engine…</div>';

  const centersWithData = Object.entries(WIZARD_STATE.centerStatus)
    .filter(([_, s]) => s && s.records > 0)
    .map(([c]) => c);

  if (centersWithData.length === 0) {
    body.innerHTML = `
      <div class="card">
        <div class="empty">
          <div class="empty-icon">📭</div>
          <p>No attendance uploaded yet for period ${WIZARD_STATE.periodNumber}. Go back and upload at least one center.</p>
          <button class="btn btn-ghost" style="margin-top:12px" onclick="WIZARD_STATE.step=2;renderWizard()">← Back to Niles</button>
        </div>
      </div>`;
    return;
  }

  try {
    const filing = await api('POST', '/cdc-filing/generate', {
      period_number: WIZARD_STATE.periodNumber,
      centers: centersWithData,
    });
    WIZARD_STATE.generatedFiling = filing;
    renderFilingSummary(body, filing, centersWithData);
  } catch (e) {
    body.innerHTML = `<div class="card"><div style="color:var(--red)">Error: ${e.message}</div></div>`;
  }
}

function renderFilingSummary(body, filing, centersWithData) {
  const centerCards = centersWithData.map(center => {
    const data = filing.centers[center];
    if (!data) return '';
    const kids = data.children;
    const totalKids = kids.length;
    const totalHours = kids.reduce((s, k) => s + (k.total_hours||0), 0);
    const excludedKids = kids.filter(k => k.excluded_after).length;
    const inactiveKids = kids.filter(k => k.inactive_after).length;
    const holidayAbsent = kids.filter(k => k.holiday_absent_hours > 0).length;

    return `
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy)">${center}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-sm btn-primary" onclick="wizardPrint('${center}')">🖨 Print DHS Form</button>
            <button class="btn btn-sm btn-primary" onclick="wizardDownloadPDF('${center}')">📄 Download PDF</button>
            <button class="btn btn-sm btn-gold" onclick="wizardDownload('${center}','totals')">⬇ Totals CSV</button>
            <button class="btn btn-sm btn-ghost" onclick="wizardDownload('${center}','daily')">⬇ Per-Day CSV</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px">
          <div style="padding:10px;background:var(--cream);border-radius:6px">
            <div style="font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">CDC Kids</div>
            <div style="font-size:22px;font-weight:600;color:var(--navy)">${totalKids}</div>
          </div>
          <div style="padding:10px;background:var(--cream);border-radius:6px">
            <div style="font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">Total Hours</div>
            <div style="font-size:22px;font-weight:600;color:var(--navy)">${totalHours.toFixed(1)}</div>
          </div>
          ${holidayAbsent > 0 ? `<div style="padding:10px;background:var(--amber-light);border-radius:6px">
            <div style="font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.5px">Holiday/Absent</div>
            <div style="font-size:22px;font-weight:600;color:var(--amber)">${holidayAbsent}</div>
          </div>` : ''}
          ${excludedKids > 0 ? `<div style="padding:10px;background:var(--red-light);border-radius:6px">
            <div style="font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.5px">Excluded (21+)</div>
            <div style="font-size:22px;font-weight:600;color:var(--red)">${excludedKids}</div>
          </div>` : ''}
          ${inactiveKids > 0 ? `<div style="padding:10px;background:var(--red-light);border-radius:6px">
            <div style="font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.5px">Inactive Cutoff</div>
            <div style="font-size:22px;font-weight:600;color:var(--red)">${inactiveKids}</div>
          </div>` : ''}
        </div>

        <details>
          <summary style="cursor:pointer;color:var(--blue);font-size:13px;font-weight:500">Show per-child breakdown (${totalKids} children)</summary>
          <div class="table-wrap" style="margin-top:10px;max-height:400px;overflow-y:auto">
            <table>
              <thead><tr>
                <th>Child</th>
                <th>GSRP</th>
                <th>Enrolled Hrs/Day</th>
                <th>Total Hours</th>
                <th>Normal</th>
                <th>Holiday/Absent</th>
                <th>Status</th>
              </tr></thead>
              <tbody>
              ${kids.map(k => `
                <tr>
                  <td><strong>${k.last_name}, ${k.first_name}</strong></td>
                  <td>${k.is_gsrp ? '✅' : '—'}</td>
                  <td>${k.enrolled_hours_per_day}</td>
                  <td><strong>${k.total_hours.toFixed(2)}</strong></td>
                  <td>${k.normal_hours.toFixed(2)}</td>
                  <td style="color:${k.holiday_absent_hours>0?'var(--amber)':'var(--gray)'}">${k.holiday_absent_hours.toFixed(2)}</td>
                  <td style="font-size:12px">
                    ${k.excluded_after ? `<span style="color:var(--red)">Excluded from ${fmtDateShort(k.excluded_after)}</span>` :
                      k.inactive_after ? `<span style="color:var(--red)">Inactive ${fmtDateShort(k.inactive_after)}</span>` :
                      `<span style="color:var(--green)">Filing</span>`}
                  </td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </details>
      </div>`;
  }).join('');

  body.innerHTML = `
    <div class="card">
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy);margin-bottom:8px">
        Step 5 — Generate &amp; Download
      </div>
      <p style="color:var(--gray);font-size:14px;line-height:1.7;margin-bottom:0">
        Rules applied: GSRP carve-outs, Friday full-day for Niles/Peace, multiple in/out blocks summed,
        absence streak (1–10 normal, 11–20 holiday/absent, 21+ excluded), and inactive-date cutoffs.
      </p>
    </div>

    ${centerCards}

    <div class="card" style="background:var(--cream)">
      <div style="font-weight:600;color:var(--navy);margin-bottom:8px;font-size:14px">📝 What to file in MiLogin/CDC Portal</div>
      <p style="font-size:13.5px;color:var(--gray);line-height:1.7;margin-bottom:10px">
        Download the Totals CSV for each center above. Each row is one child's total billable hours for
        period ${WIZARD_STATE.periodNumber}. Submit these to CDC by <strong style="color:var(--red)">${fmtDateShort(WIZARD_STATE.reportingDeadline)}</strong>.
      </p>
      <p style="font-size:12.5px;color:var(--gray);line-height:1.6;margin:0">
        <em>Note: DHS-exact format will be added once Mary uploads a sample filing form. The current
        CSV includes all data needed for the filing; just copy column values into the DHS form.</em>
      </p>
    </div>

    <div style="display:flex;gap:10px;justify-content:space-between;margin-top:16px">
      <button class="btn btn-ghost" onclick="WIZARD_STATE.step=4;renderWizard()">← Back</button>
      <button class="btn btn-gold" onclick="wizardReset()">Start New Filing</button>
    </div>
  `;
}

function wizardDownload(center, format) {
  const url = `/api/cdc-filing/download?period_number=${WIZARD_STATE.periodNumber}&center=${encodeURIComponent(center)}&format=${format}${TOKEN?'&token='+TOKEN:''}`;
  window.open(url, '_blank');
}

function wizardPrint(center) {
  const url = `/api/cdc-filing/print?period_number=${WIZARD_STATE.periodNumber}&center=${encodeURIComponent(center)}${TOKEN?'&token='+TOKEN:''}`;
  window.open(url, '_blank');
}

function wizardDownloadPDF(center) {
  const url = `/api/cdc-filing/pdf?period_number=${WIZARD_STATE.periodNumber}&center=${encodeURIComponent(center)}${TOKEN?'&token='+TOKEN:''}`;
  window.open(url, '_blank');
}

function wizardReset() {
  WIZARD_STATE = {
    step: 1, periodNumber: null, periodStart: null, periodEnd: null,
    reportingDeadline: null,
    centerStatus: { Niles: null, Peace: null, Montessori: null },
    generatedFiling: null,
  };
  renderWizard();
}

let LAST_ROSTER_FILE = null;

async function handleRosterPreview(input) {
  const file = input.files[0];
  if (!file) return;
  LAST_ROSTER_FILE = file;

  const fd = new FormData();
  fd.append('file', file);
  fd.append('center', currentCenter);

  document.getElementById('ir-preview').innerHTML = '<div class="loading">Parsing preview…</div>';
  try {
    const result = await uploadFile('/upload/roster/preview', fd);
    renderRosterPreview(result);
  } catch (e) {
    document.getElementById('ir-preview').innerHTML =
      `<div style="background:var(--red-light);border:1px solid var(--red);border-radius:8px;padding:16px;color:var(--red)">Error: ${e.message}</div>`;
  }
}

function renderRosterPreview(result) {
  const { rows, headers, errors, totalRows } = result;
  const newCount = rows.filter(r => r.action === 'new').length;
  const updateCount = rows.filter(r => r.action === 'update').length;
  const unknownCount = rows.filter(r => r.subsidy_type === 'unknown').length;

  const rowsHtml = rows.slice(0, 200).map(r => `
    <tr style="${r.action==='new' ? 'background:var(--green-light)' : ''}">
      <td>${r.action === 'new'
        ? '<span class="badge-pill badge-paid">NEW</span>'
        : '<span class="badge-pill badge-pending">Update</span>'}</td>
      <td><strong>${r.last_name}, ${r.first_name}</strong></td>
      <td>${subsidyBadge(r.subsidy_type)}</td>
      <td>${r.is_gsrp ? '✅' : '—'}</td>
      <td>${r.is_cdc ? '✅' : '—'}</td>
      <td>${r.is_school_age ? '✅' : '—'}</td>
      <td>${r.is_active ? '✅' : '<span style="color:var(--red)">Inactive</span>'}</td>
      <td style="font-size:12px;color:var(--gray)">${r.classroom || '—'}</td>
      <td style="font-size:12px;color:var(--gray)">${r.funding || '—'}</td>
    </tr>`).join('');

  document.getElementById('ir-preview').innerHTML = `
    <div style="background:var(--blue-light);border:1px solid var(--blue);border-radius:8px;padding:16px;margin-bottom:16px">
      <strong style="color:var(--blue);font-size:15px">📋 Preview — nothing has been saved yet</strong>
      <div style="margin-top:10px;display:flex;gap:20px;flex-wrap:wrap;font-size:13.5px">
        <span><strong>${totalRows}</strong> total rows</span>
        <span style="color:var(--green)"><strong>${newCount}</strong> new children</span>
        <span style="color:var(--gray)"><strong>${updateCount}</strong> updates</span>
        ${unknownCount > 0 ? `<span style="color:var(--amber)"><strong>${unknownCount}</strong> unknown subsidy (will flag)</span>` : ''}
        ${errors.length > 0 ? `<span style="color:var(--red)"><strong>${errors.length}</strong> errors</span>` : ''}
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--gray)">
        <strong>Detected columns:</strong> ${headers.join(' · ')}
      </div>
      ${errors.length > 0 ? `
        <details style="margin-top:10px;font-size:12.5px;color:var(--red)">
          <summary style="cursor:pointer">Show errors</summary>
          <ul style="margin-top:6px;padding-left:20px">${errors.slice(0,20).map(e => `<li>${e}</li>`).join('')}</ul>
        </details>` : ''}
    </div>

    <div class="card" style="padding:0;margin-bottom:16px">
      <div class="table-wrap" style="max-height:500px;overflow-y:auto">
        <table>
          <thead><tr>
            <th>Action</th>
            <th>Child Name</th>
            <th>Subsidy</th>
            <th>GSRP</th>
            <th>CDC</th>
            <th>School Age</th>
            <th>Active</th>
            <th>Classroom</th>
            <th>Funding</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
      ${rows.length > 200 ? `<div style="padding:10px;text-align:center;color:var(--gray);font-size:12.5px;border-top:1px solid var(--border)">Showing first 200 of ${rows.length} rows · commit will process all</div>` : ''}
    </div>

    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-gold" onclick="commitRosterImport()">✓ Commit Import to ${currentCenter}</button>
      <button class="btn btn-ghost" onclick="document.getElementById('ir-preview').innerHTML='';document.getElementById('ir-file').value='';LAST_ROSTER_FILE=null;">Cancel</button>
    </div>
    <div id="ir-commit-result" style="margin-top:16px"></div>
  `;
}

async function commitRosterImport() {
  if (!LAST_ROSTER_FILE) return toast('No file loaded — re-upload','error');
  const mode = document.getElementById('ir-mode').value;
  const fd = new FormData();
  fd.append('file', LAST_ROSTER_FILE);
  fd.append('center', currentCenter);
  fd.append('mode', mode);

  document.getElementById('ir-commit-result').innerHTML = '<div class="loading">Importing…</div>';
  try {
    const r = await uploadFile('/upload/roster/commit', fd);
    document.getElementById('ir-commit-result').innerHTML = `
      <div style="background:var(--green-light);border:1px solid var(--green);border-radius:8px;padding:16px">
        <strong style="color:var(--green);font-size:15px">✅ Roster imported</strong>
        <div style="margin-top:8px;font-size:13.5px;display:flex;gap:20px;flex-wrap:wrap">
          <span><strong>${r.created}</strong> new children added</span>
          <span><strong>${r.updated}</strong> updated</span>
          ${r.skipped > 0 ? `<span style="color:var(--amber)"><strong>${r.skipped}</strong> skipped (missing name)</span>` : ''}
          ${r.deactivated > 0 ? `<span style="color:var(--red)"><strong>${r.deactivated}</strong> deactivated</span>` : ''}
          ${r.flags.length > 0 ? `<span style="color:var(--amber)"><strong>${r.flags.length}</strong> flags raised</span>` : ''}
        </div>
        <div style="margin-top:12px;font-size:13px">
          <button class="btn btn-sm btn-primary" onclick="showPage('children')">Go to Child Roster →</button>
          ${r.flags.length > 0 ? `<button class="btn btn-sm btn-ghost" onclick="showPage('flags')">Review ${r.flags.length} flags →</button>` : ''}
        </div>
      </div>`;
    toast(`Imported: ${r.created} new, ${r.updated} updated`,'success');
  } catch (e) {
    document.getElementById('ir-commit-result').innerHTML =
      `<div style="background:var(--red-light);border:1px solid var(--red);border-radius:8px;padding:16px;color:var(--red)">Error: ${e.message}</div>`;
  }
}


function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const mins = Math.floor(diff/60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  // Check server auth mode — is direct access allowed?
  try {
    const res = await fetch('/api/auth/mode');
    if (res.ok) AUTH_MODE = await res.json();
  } catch (e) { /* non-fatal */ }

  // If direct access is allowed, just show the app — stale tokens will be
  // cleared automatically by api() on the first 401.
  if (AUTH_MODE.allowDirectAccess || TOKEN) {
    showPage('dashboard');
    return;
  }

  // Otherwise require an SSO token
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:420px;margin:60px auto;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">🔒</div>
      <div class="card-title">Authentication Required</div>
      <p style="color:var(--gray);font-size:14px">Please launch this app from the TCC Hub.</p>
    </div>`;
})();
</script>
